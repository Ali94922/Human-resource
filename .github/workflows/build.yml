name: Build Application
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install and Build
        run: |
          # تنظيف بيئة العمل
          rm -rf node_modules package-lock.json
          
          # إعادة إنشاء ملف القفل لضمان توافق النسخ
          npm install --package-lock-only
          
          # تثبيت المكتبات (سيتم تثبيت الإصدارات المناسبة للينكس)
          npm ci
          
          # بناء المشروع
          npm run build
