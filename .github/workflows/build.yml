name: Build Application
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install and Build
        run: |
          # حذف أي ملفات قديمة تسبب تعارضاً
          rm -rf node_modules package-lock.json
          
          # تثبيت المكتبات من جديد في بيئة لينكس
          npm install
          
          # البناء باستخدام أداة vite مباشرة
          npx vite build
