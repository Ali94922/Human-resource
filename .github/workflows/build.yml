name: Build Application
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Clean Install and Build
        run: |
          # حذف أي ملفات قديمة (node_modules/lock) قد تكون رفعتها من ويندوز
          rm -rf node_modules package-lock.json
          
          # تثبيت المكتبات مع تجاهل الاعتماديات الاختيارية التي تسبب خطأ الـ native binding
          npm install --no-optional
          
          # بناء المشروع
          npm run build
