name: Build Application
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install and Build
        run: |
          # مسح الملفات القديمة التي قد تسبب تعارضاً في البيئة
          rm -rf node_modules package-lock.json
          
          # تثبيت المكتبات من جديد مع إجبار النظام على إعادة البناء
          npm install --force
          
          # تشغيل أمر البناء
          npm run build
